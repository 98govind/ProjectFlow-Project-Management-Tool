<!DOCTYPE html>
<html>
<head>
    <title>Edit Task | ProjectFlow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <h2>ProjectFlow</h2>
        <a href="/project/{{ task.project_id }}">Back</a>
    </nav>

    <div class="container">
        <div class="create-box">
            <h2>Edit Task</h2>

            <form method="POST">
                <input type="text" name="title" value="{{ task.title }}" required>
                <textarea name="description">{{ task.description }}</textarea>
                <input type="text" name="assigned_to" value="{{ task.assigned_to }}">
                <input type="date" name="due_date" value="{{ task.due_date }}">

                <select name="priority" required>
                    <option value="High" {% if task.priority == "High" %}selected{% endif %}>High Priority</option>
                    <option value="Medium" {% if task.priority == "Medium" %}selected{% endif %}>Medium Priority</option>
                    <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>Low Priority</option>
                </select>

                <textarea name="comment">{{ task.comment }}</textarea>
                <button type="submit">Update Task</button>
            </form>
        </div>
    </div>
</body>
</html>
